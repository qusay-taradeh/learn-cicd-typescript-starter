name: cd

on:
  push:
    branches: [main]

jobs:
  deploys:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build
      
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
  
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
  
      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: Build the Docker image and push it to Google Artifact Registry
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/avid-relic-489914-v3/notely-ar-repo/notely:latest .
      
      - name: Run the Migrations
        run: npm run db:migrate

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/avid-relic-489914-v3/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project avid-relic-489914-v3 --max-instances=4
  